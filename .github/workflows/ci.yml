name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Security
    runs-on: ubuntu-latest

    steps:
      # Actions pinned to full commit SHAs (not tags) per security best practice.

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524bfa5e821ab2ed929e06b2a9a63df4e4f  # v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Compile hash-locked requirements (CI canonical build)
        # requirements.txt committed to the repo is a reference compiled on the
        # maintainer's machine. CI recompiles to get the correct wheel hashes for
        # the CI platform (Linux x86-64, Python 3.11). The compiled output is used
        # only within this job; the committed file documents pinned versions.
        run: pip-compile --generate-hashes requirements.in -o requirements-ci.txt

      - name: Install dependencies from CI-compiled lockfile
        run: pip install -r requirements-ci.txt

      - name: Install package (editable, no deps)
        run: pip install -e . --no-deps

      - name: Install dev/audit tools
        run: pip install pytest bandit pip-audit

      - name: Generate synthetic sample data
        run: python tests/generate_sample_data.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Security — bandit (src/)
        run: bandit -r src/ -ll

      - name: Security — pip-audit (fail on known vulnerabilities)
        run: pip-audit --requirement requirements-ci.txt
