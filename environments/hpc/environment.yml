# Conda/mamba environment for rdstemplate on HPC clusters.
# v0.1.0: STUB — versions mirror requirements.txt; adjust channel priorities
# for your cluster's module system.
#
# Create with:
#   mamba env create -f environments/hpc/environment.yml
#   conda activate rdstemplate
#   pip install -e /path/to/research-ds-template --no-deps
#
# Update with:
#   mamba env update -f environments/hpc/environment.yml --prune

name: rdstemplate

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Core scientific stack (prefer conda-forge builds for HPC MKL/OpenBLAS compat)
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1
  - scikit-learn=1.5.2
  - pillow=10.4.0        # FIXME: bump to 12.x when conda-forge builds are available
  - pyyaml=6.0.1

  # pip-only packages
  - pip:
    - pydantic==2.7.1
    - boto3==1.34.84
    - s3fs==2024.3.1
    - aiohttp==3.14.1
    - urllib3==2.7.0
